version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smarthire_postgres
    environment:
      POSTGRES_DB: smarthire
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smarthire_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: